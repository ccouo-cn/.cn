<!-- التحقق من المسار الحالي، إذا لم يكن الدليل الجذر أو دليل الفهرس، انتقل إلى 404.html?B=المسار_الكامل -->
<script>
    (function() {
        // الحصول على مسار الرابط الحالي
        var path = window.location.pathname;
        // التحقق مما إذا كان المسار هو الدليل الجذر
        var isRoot = (path === '/' || path === '');
        // التحقق مما إذا كان المسار يشير إلى صفحة الفهرس (index.html, index.htm, إلخ)
        var isIndex = /\/index\.[a-z0-9]+$/i.test(path);

        // إذا لم يكن المسار هو الجذر أو الفهرس، قم بالتوجيه إلى صفحة 404 مع إرسال المسار الكامل في المعامل B
        if (!isRoot && !isIndex) {
            // دمج المسار مع معلمات البحث (query string) للحصول على المسار الكامل
            var fullPath = path + window.location.search;
            window.location.href = '404.html?B=' + encodeURIComponent(fullPath);
        }
    })();
</script>

/* ========== تأثير الظهور التدريجي للنصوص ========== */

/* ========== تأثير الظهور التدريجي للأيقونات ========== */
.glass {
    --r: 0deg; --j: 0;
    width: clamp(30px, 7vw, 56px); height: clamp(30px, 7vw, 56px);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: clamp(0.7rem, 1.6vw, 1.3rem);
    color: #999; background: rgba(255,255,255,0.7); backdrop-filter: blur(10px);
    border: 1px solid rgba(0,0,0,0.06); text-decoration: none;
    transform: rotate(var(--r)) scale(0.3); opacity: 0;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative; flex-shrink: 0;
}
#icons-container.visible .glass {
    animation: iconPop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    animation-delay: calc(var(--j) * 0.07s);
}
@keyframes iconPop {
    from { opacity: 0; transform: rotate(var(--r)) scale(0.3); }
    to { opacity: 1; transform: rotate(var(--r)) scale(1); }
}
#icons-container.visible .glass:hover {
    transform: rotate(0deg) scale(1.2) !important; color: #fff !important;
    background: #ff2e93 !important; border-color: #ff2e93 !important;
    box-shadow: 0 10px 30px rgba(255,46,147,0.35); z-index: 10;
}
.glass svg { width: clamp(14px, 2vw, 22px); height: clamp(14px, 2vw, 22px); fill: currentColor; }
.glass::after {
    content: attr(data-text); position: absolute; bottom: -26px; left: 50%;
    transform: translateX(-50%) scale(0.8); font-size: 10px; color: #666; background: #fff;
    padding: 2px 8px; border-radius: 4px; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.glass:hover::after { opacity: 1; transform: translateX(-50%) scale(1); bottom: -30px; }

<script>
// مصفوفة تحتوي على بيانات الروابط والأيقونات
const linksData = [

    {href: "/tg.html", target: "_blank", icon: "fab fa-telegram", text: "Telegram"},
    {href: "https://github.com/ccouo-cn/galdroid", target: "_blank", icon: "fab fa-github", text: "GitHub"},
    {href: "https://www.facebook.com/profile.php?id=61590591997290", target: "_blank", rel: "noopener noreferrer", icon: "fab fa-facebook-f", text: "Facebook"},
    {href: "https://www.instagram.com/q2020770", target: "_blank", rel: "noopener noreferrer", icon: "fab fa-instagram", text: "Instagram"},
    {href: "https://x.com/sqks9123", target: "_blank", isSvg: true, svg: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>', text: "X"},
    {href: "https://www.ccouo.cn/cloud/me.htm", icon: "fab fa-weixin", text: "微信"},
    {href: "https://mbd.baidu.com/newspage/data/landingshare?context=%7B%22nid%22%3A%22news_9664967689301931886%22%2C%22sourceFrom%22%3A%22bjh%22%7D", target: "_blank", icon: "fab fa-qq", text: "QQ"},
    {href: "https://www.linkedin.com/in/%E6%8B%89-%E6%97%AD-02348341a", target: "_blank", rel: "noopener noreferrer", icon: "fab fa-linkedin-in", text: "LinkedIn"},
    {href: "mailto:ccouo666@outlook.com", icon: "fas fa-envelope", text: "邮箱"},
    {href: "/user/feedback.htm", target: "_blank", icon: "fas fa-comment-dots", text: "在线反馈"}
];

// دالة لإنشاء وعرض الأيقونات داخل الحاوية
function renderIcons() {
    const container = document.getElementById('icons-container');
    container.innerHTML = '';
    const total = linksData.length;
    linksData.forEach((item, index) => {
        const a = document.createElement('a');
        a.className = 'glass';
        a.href = item.href;
        if (item.target) a.target = item.target;
        if (item.rel) a.rel = item.rel;
        a.setAttribute('data-text', item.text);
        const maxAngle = 28;
        const r = total > 1 ? -maxAngle + (index / (total - 1)) * (maxAngle * 2) : 0;
        a.style.setProperty('--r', r + 'deg');
        a.style.setProperty('--j', index);
        if (item.isSvg) {
            a.innerHTML = item.svg;
        } else {
            const icon = document.createElement('i');
            icon.className = item.icon;
            a.appendChild(icon);
        }
        container.appendChild(a);
    });
}
renderIcons();

// مراقبة العناصر عند التمرير لإضافة تأثيرات الظهور
const blocks = document.querySelectorAll('.section, footer, nav');
blocks.forEach(block => {
    const obs = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                // إظهار الأيقونات عند ظهور الفوتر
                if (entry.target.tagName === 'FOOTER') {
                    document.getElementById('icons-container').classList.add('visible');
                }
            } else {
                entry.target.classList.remove('visible');
                if (entry.target.tagName === 'FOOTER') {
                    document.getElementById('icons-container').classList.remove('visible');
                }
            }
        });
    }, { threshold: 0.1 });
    obs.observe(block);
});
</script>
