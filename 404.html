<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · 页面不存在</title>

<!-- استيراد Tailwind CSS ومكتبة الأيقونات والخطوط -->
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>@import url("https://use.typekit.net/zmc8vly.css");</style>
<link rel="icon" href="favicon.ico">

<style>
/* إعدادات الخط والخلفية الأساسية */
body {
    font-family: 'degular-display', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fafafa;
    color: #1a1a1a;
    overflow-x: hidden;
}

/* ========== تأثير الظهور التدريجي للعناصر ========== */
.stagger-item { opacity: 0; transform: translateY(50px) scale(0.9); }
.visible .stagger-item {
    animation: staggerPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    animation-delay: calc(var(--i) * 0.12s);
}
@keyframes staggerPop {
    from { opacity: 0; transform: translateY(50px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ========== زر العودة بلمسة "متغطرسة" ========== */
.home-btn {
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
}
.home-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 15px 35px rgba(255,46,147,0.35);
}
.home-btn:active {
    transform: translateY(1px) scale(0.98);
}
</style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center relative overflow-hidden">

<!-- خلفية رقم 404 الضخمة كعنصر خلفي (الرقم 404 كخلفية ضخمة جداً) -->
<div class="fixed inset-0 flex items-center justify-center pointer-events-none -z-20 select-none">
    <span class="text-[25rem] md:text-[45rem] font-black text-pink-100 leading-none tracking-tighter">404</span>
</div>

<!-- خلفية زخرفية خفيفة بنمط مسحوب (بلور) -->
<div class="absolute inset-0 overflow-hidden -z-10 pointer-events-none">
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-pink-200 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
</div>

<main class="max-w-2xl mx-auto px-6 text-center visible">

    <!-- العنوان الرئيسي بأسلوب متغطرس ولطيف -->
    <h1 class="text-4xl md:text-6xl font-bold mb-10 text-gray-900 stagger-item" style="--i:0">
        呀 讨厌˶>ᗜ<˶<br><span class="text-pink-500 text-3xl md:text-5xl">呜呜呜，页面不存在</span>
    </h1>
    
    <!-- إدراج صورة تعبيرية (ملصق/表情包) -->
    <div class="stagger-item mb-10" style="--i:1">
        <img src="https://mmbiz.qpic.cn/mmbiz_jpg/VDCUoW3UiblKUscRbSFoVV57IB2YmaSEAianvBJsia6pmlvUgOibg1Ha4EONYuCW8kvWial6NL2S0zW1pVXj5eLr4lXbkoeFShiaCFNLibUU4oOr9I/640?wx_fmt=jpeg&watermark=1&tp=webp&wxfrom=5&wx_lazy=1#imgIndex=12" 
             alt="" 
             referrerpolicy="no-referrer" 
             class="w-56 h-56 md:w-72 md:h-72 mx-auto rounded-3xl shadow-2xl border-4 border-white rotate-3 hover:rotate-0 hover:scale-110 transition-all duration-500 object-cover bg-white">
    </div>
    
    <!-- نص فرعي بأسلوب "تسونديري" (Tsundere) -->
   
    </p>
    
    <!-- عرض المسار بدون بطاقة (بسيط وأنيق) -->
    <p class="text-gray-400 font-mono text-sm mb-14 stagger-item" style="--i:3">
       路径：<span id="error-path" class="text-pink-400"></span>
    </p>
    
    <!-- زر العودة بأسلوب آمر ولطيف -->
    <a href="/" class="home-btn inline-flex items-center gap-3 px-12 py-5 rounded-full border-2 border-pink-500 bg-pink-500 text-white text-base font-bold tracking-widest uppercase hover:bg-white hover:text-pink-500 stagger-item" style="--i:4">
        <i class="fas fa-broom"></i>
        返回首页！
    </a>
    
</main>

<script>
// دالة لعرض مسار الصفحة الحالية مباشرة
(function() {
    // الحصول على مسار الصفحة الحالية مباشرة من المتصفح
    var currentPath = window.location.pathname + window.location.search;
    
    // تحديد العنصر المخصص لعرض النص
    var pathElement = document.getElementById('error-path');
    
    // التحقق من المسار وعرضه
    if (currentPath && currentPath !== '/404.html' && currentPath !== '/') {
        pathElement.textContent = currentPath;
    } else {
        pathElement.textContent = '什么都没有哦～真是白痴呢';
    }
})();
</script>

</body>
</html>
