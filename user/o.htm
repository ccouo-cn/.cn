    <span>Facebook</span>
  </a>

  <a href="https://www.instagram.com/q2020770" target="_blank" rel="noopener noreferrer" class="social-item item-ig">
    <i class="fab fa-instagram"></i>
    <span>Instagram</span>

  <a href="https://x.com/sqks9123" target="_blank" class="social-item item-x">

  <a href="javascript:void(0)" onclick="showWechatPopup()" class="social-item item-wechat">

  </a>

  <a href="https://qm.qq.com/q/qQR0yeGQYo" target="_blank" class="social-item item-qq">

  <a href="mailto:ccouo666@outlook.com" class="social-item item-mail">

  </a>

  <a href="/user/feedback.htm" target="_blank" class="social-item item-feedback">
    <i class="fas fa-comment-dots"></i>
    <span>在线反馈</span>

</div>

<!-- 微信弹窗 -->
<div class="overlay" id="wechatOverlay" onclick="closeWechatPopup()"></div>
<div class="popup" id="wechatPopup">
  微信号：<b>error 404</b>
  <br />
  <button onclick="closeWechatPopup()">关闭</button>
</div>

<script>
  function showWechatPopup() {
    document.getElementById('wechatPopup').style.display = 'block';
    document.getElementById('wechatOverlay').style.display = 'block';
  }

  function closeWechatPopup() {
    document.getElementById('wechatPopup').style.display = 'none';
    document.getElementById('wechatOverlay').style.display = 'none';
  }
</script>

</body>
</html>
